<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — SCI Factures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--gray-50);
    }
    .login-card {
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(15,17,23,0.08);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo-mark {
      width: 32px;
      height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--gray-900);
    }
    .login-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--gray-400);
      margin-bottom: 28px;
    }
    .login-error {
      background: var(--red-light);
      border: 1px solid #FCA5A5;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #991B1B;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span class="login-logo-text">SCI Factures</span>
    </div>

    <div class="login-title">Connexion</div>
    <div class="login-subtitle">Accédez à votre espace comptabilité</div>

    {% if error %}
    <div class="login-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="votre@email.com"
          required
          autofocus
        />
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" for="password">Mot de passe</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
        Se connecter
      </button>
    </form>
  </div>
</body>
</html>
